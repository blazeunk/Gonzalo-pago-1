workflows:
  capacitor-ios-workflow:
    name: Capacitor iOS Build
    max_build_duration: 120
    instance_type: mac_mini_m1        # Más rápido y barato

    integrations:
      app_store_connect: codemagic    # Usa la integración automática que configuraste

    environment:
      ios_signing:
        distribution_type: development   # Cambia a app_store cuando publiques
        bundle_identifier: com.tuapp.gonzalopago   # ¡CAMBIAR! Poné tu bundle ID real (ej: com.tuempresa.gonzalopago)
      vars:
        XCODE_WORKSPACE: "ios/App/App.xcworkspace"
        XCODE_SCHEME: "App"
        NODE_VERSION: "20.14.0"
        XCODE_VERSION: "16.0"           # O la versión más reciente disponible en Codemagic

    triggering:
      events:
        - push
        - pull_request
        - tag
      cancel_previous_builds: true

    scripts:
      - name: Instalar dependencias Node
        script: |
          npm ci

      - name: Sincronizar Capacitor con iOS
        script: |
          npm run build              # Si tu proyecto tiene un comando de build (React/Vue/etc.)
          npx cap sync ios

      - name: Instalar CocoaPods (si es necesario)
        script: |
          cd ios/App
          pod install

      - name: Configurar code signing automático
        script: |
          xcode-project use-profiles

      - name: Incrementar build number (opcional pero recomendado)
        script: |
          cd $CM_BUILD_DIR/ios/App
          agvtool new-version -all $(($CM_BUILD_NUMBER + 1))

      - name: Construir y exportar .ipa
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - $HOME/Library/Developer/Xcode/DerivedData/**/Build/**/*.dSYM
      - /tmp/xcodebuild_logs/*.log

    publishing:
      email:
        recipients:
          - tuemail@example.com
        notify:
          success: true
          failure: true

      app_store_connect:
        auth: integration
        submit_to_testflight: false   # Cambia a true cuando estés listo para TestFlight
        submit_to_app_store: false
