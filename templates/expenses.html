{% extends "base.html" %}
{% block content %}

<h2>Gastos</h2>

<a href="{{ url_for('export_expenses') }}" class="btn btn-success mb-3">
    Exportar Excel
</a>

<table class="table table-striped">
    <tr>
        <th>Fecha</th>
        <th>Monto</th>
        <th>Categoria</th>
        <th>Descripcion</th>
        <th>Acciones</th>
    </tr>

    {% for g in expenses %}
    <tr>
        <form method="POST" action="{{ url_for('edit_expense', id=g.id) }}">
            <td><input type="date" name="fecha" value="{{ g.fecha }}"></td>
            <td><input type="number" step="0.01" name="monto" value="{{ g.monto }}"></td>
            <td><input type="text" name="categoria" value="{{ g.categoria }}"></td>
            <td><input type="text" name="descripcion" value="{{ g.descripcion }}"></td>

            <td>
                <button class="btn btn-primary btn-sm">Guardar</button>
                <a href="{{ url_for('delete_expense', id=g.id) }}"
                   class="btn btn-danger btn-sm"
                   onclick="return confirm('¿Eliminar gasto?')">
                   Eliminar
                </a>
            </td>
        </form>
    </tr>
    {% endfor %}
</table>

{% endblock %}
