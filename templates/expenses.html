{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

<h2>Gastos</h2>

<form method="POST" action="{{ url_for('add_expense') }}">
<input name="monto" placeholder="Monto" class="form-control mb-2">
<input name="categoria" placeholder="Categoria" class="form-control mb-2">
<input name="descripcion" placeholder="Descripcion" class="form-control mb-2">
<input type="date" name="fecha" class="form-control mb-2">
<button class="btn btn-success w-100">Agregar</button>
</form>

<hr>

<a href="{{ url_for('export_expenses') }}" class="btn btn-primary mb-3">Exportar Excel</a>

<table class="table table-striped">
<tr><th>Monto</th><th>Cat</th><th>Acciones</th></tr>

{% for g in expenses %}
<tr>
<td>{{ g.monto }}</td>
<td>{{ g.categoria }}</td>
<td>
<a href="{{ url_for('delete_expense', id=g.id) }}" onclick="return confirm('Eliminar?')" class="btn btn-danger btn-sm">X</a>
</td>
</tr>
{% endfor %}

</table>

</div>

{% endblock %}
