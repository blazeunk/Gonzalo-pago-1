<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>Gonzalo Pago - {% block title %}Inicio{% endblock %}</title>
    
    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    
    <!-- Chart.js (si usas gráficos) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- === Tus estilos personalizados van AQUÍ === -->
    <style>
        :root {
            --bs-body-bg: #f8f9fa;
            --bs-body-color: #212529;
        }

        [data-bs-theme="dark"] {
            --bs-body-bg: #121212;
            --bs-body-color: #e0e0e0;
            --bs-card-bg: #1e1e1e;
            --bs-card-border-color: #333;
            --bs-table-bg: #1e1e1e;
            --bs-table-color: #e0e0e0;
            --bs-table-border-color: #444;
        }

        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            min-height: 100vh;
        }

        .navbar-brand {
            font-weight: 700;
            letter-spacing: -0.5px;
        }

        .offcanvas, .offcanvas-backdrop {
            --bs-offcanvas-width: 280px;
        }

        .card {
            background-color: var(--bs-card-bg, #fff);
            border-color: var(--bs-card-border-color, rgba(0,0,0,0.125));
        }

        /* Mejora para gráficos en modo oscuro */
        canvas {
            max-width: 100%;
        }

        @media (max-width: 991.98px) {
            main {
                padding-top: 1rem;
                padding-bottom: 2rem;
            }
        }

        @media (max-width: 576px) {
            .display-3 {
                font-size: 2.5rem;
            }
        }
    </style>
    <!-- Manifest para PWA -->
<link rel="manifest" href="/static/manifest.json">

<!-- Iconos (crea estos archivos en static/) -->
<link rel="icon" type="image/png" href="/static/icon-192.png">
<link rel="apple-touch-icon" href="/static/icon-192.png">

<!-- Nombre y colores -->
<meta name="theme-color" content="#0d6efd">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
</head>
<body class="min-vh-100">

    <!-- Navbar superior -->
    <nav class="navbar navbar-expand-lg bg-body-tertiary border-bottom shadow-sm sticky-top">
        <div class="container-fluid px-3 px-md-4">
            <a class="navbar-brand d-flex align-items-center" href="{{ url_for('dashboard') }}">
                <i class="bi bi-wallet2 fs-3 me-2 text-primary"></i>
                Gonzalo Pago
            </a>

            <div class="d-flex align-items-center gap-2">
                <button id="themeToggle" class="btn btn-outline-secondary btn-sm rounded-circle" title="Cambiar tema">
                    <i class="bi bi-moon-stars-fill"></i>
                </button>
                <button class="navbar-toggler" type="button" data-bs-toggle="offcanvas" data-bs-target="#sidebarOffcanvas" aria-label="Toggle navigation">
                    <span class="navbar-toggler-icon"></span>
                </button>
            </div>

            <!-- Offcanvas móvil -->
            <div class="offcanvas offcanvas-start" tabindex="-1" id="sidebarOffcanvas" aria-labelledby="sidebarOffcanvasLabel">
                <div class="offcanvas-header border-bottom">
                    <h5 class="offcanvas-title fw-bold" id="sidebarOffcanvasLabel">
                        <i class="bi bi-wallet2 text-primary me-2"></i>Gonzalo Pago
                    </h5>
                    <button type="button" class="btn-close" data-bs-dismiss="offcanvas" aria-label="Close"></button>
                </div>
                <div class="offcanvas-body">
                    <ul class="nav flex-column nav-pills">
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %} py-3" href="{{ url_for('dashboard') }}">
                                <i class="bi bi-speedometer2 fs-4 me-3"></i> Dashboard
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'expenses' %}active{% endif %} py-3" href="{{ url_for('pagina_gastos') }}">
                                <i class="bi bi-receipt fs-4 me-3"></i> Gastos
                            </a>
                        </li>
                        <li class="nav-item">
                            <a class="nav-link {% if active_page == 'incomes' %}active{% endif %} py-3" href="{{ url_for('pagina_ingresos') }}">
                                <i class="bi bi-cash-stack fs-4 me-3"></i> Ingresos
                            </a>
                        </li>
                    </ul>
                </div>
            </div>
        </div>
    </nav>

    <div class="container-fluid">
        <div class="row flex-nowrap">
            <!-- Sidebar desktop -->
            <nav class="col-auto col-lg-3 col-xl-2 d-none d-lg-block bg-body-tertiary border-end vh-100 position-sticky top-0 overflow-auto pt-4 shadow-sm">
                <div class="px-3 mb-4">
                    <h5 class="text-primary fw-bold"><i class="bi bi-wallet2 me-2"></i>Gonzalo Pago</h5>
                </div>
                <ul class="nav flex-column nav-pills px-2">
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'dashboard' %}active{% endif %} py-3" href="{{ url_for('dashboard') }}">
                            <i class="bi bi-speedometer2 fs-5 me-3"></i> Dashboard
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'expenses' %}active{% endif %} py-3" href="{{ url_for('pagina_gastos') }}">
                            <i class="bi bi-receipt fs-5 me-3"></i> Gastos
                        </a>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link {% if active_page == 'incomes' %}active{% endif %} py-3" href="{{ url_for('pagina_ingresos') }}">
                            <i class="bi bi-cash-stack fs-5 me-3"></i> Ingresos
                        </a>
                    </li>
                </ul>
            </nav>

            <!-- Contenido principal -->
            <main class="col-12 col-lg-9 col-xl-10 ms-lg-auto px-3 px-md-4 py-4 pb-5">
                {% block content %}{% endblock %}
                {% if 'user_id' in session %}
            <a href="{{ url_for('logout') }}" class="btn btn-outline-danger btn-sm me-2">Logout</a>
        {% else %}
            <a href="{{ url_for('login') }}" class="btn btn-outline-primary btn-sm me-2">Login</a>
        {% endif %}
                    </main>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js" integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz" crossorigin="anonymous"></script>
    <script>
        const themeToggle = document.getElementById('themeToggle');
        const html = document.documentElement;
        const savedTheme = localStorage.getItem('theme') || (window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
        html.setAttribute('data-bs-theme', savedTheme);
        themeToggle.innerHTML = savedTheme === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-stars-fill"></i>';

        themeToggle.addEventListener('click', () => {
            const current = html.getAttribute('data-bs-theme');
            const next = current === 'dark' ? 'light' : 'dark';
            html.setAttribute('data-bs-theme', next);
            localStorage.setItem('theme', next);
            themeToggle.innerHTML = next === 'dark' ? '<i class="bi bi-sun-fill"></i>' : '<i class="bi bi-moon-stars-fill"></i>';
        });
    </script>
</body>
</html>
