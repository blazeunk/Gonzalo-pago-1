{% extends "base.html" %}
{% block content %}

<div class="container mt-4">

    <h2 class="mb-4">Ingresos</h2>

    <!-- BOTONES -->
    <div class="mb-3">
        <a href="{{ url_for('export_incomes') }}" class="btn btn-success">
            Exportar a Excel
        </a>
    </div>

    <!-- FORMULARIO AGREGAR -->
    <div class="card mb-4">
        <div class="card-header">
            Agregar Ingreso
        </div>
        <div class="card-body">
            <form method="POST" action="{{ url_for('add_income') }}">
                <div class="row">

                    <div class="col-md-3">
                        <input type="date" name="fecha" class="form-control" required>
                    </div>

                    <div class="col-md-2">
                        <input type="number" step="0.01" name="monto" class="form-control" placeholder="Monto" required>
                    </div>

                    <div class="col-md-3">
                        <input type="text" name="categoria" class="form-control" placeholder="Categoría" required>
                    </div>

                    <div class="col-md-3">
                        <input type="text" name="descripcion" class="form-control" placeholder="Descripción">
                    </div>

                    <div class="col-md-1">
                        <button class="btn btn-primary w-100">+</button>
                    </div>

                </div>
            </form>
        </div>
    </div>

    <!-- TABLA -->
    <table class="table table-striped table-hover">
        <thead class="table-dark">
            <tr>
                <th>Fecha</th>
                <th>Monto</th>
                <th>Categoría</th>
                <th>Descripción</th>
                <th>Acciones</th>
            </tr>
        </thead>

        <tbody>
            {% for i in incomes %}
            <tr>

                <form method="POST" action="{{ url_for('edit_income', id=i.id) }}">

                    <td>
                        <input type="date" name="fecha" value="{{ i.fecha }}" class="form-control">
                    </td>

                    <td>
                        <input type="number" step="0.01" name="monto" value="{{ i.monto }}" class="form-control">
                    </td>

                    <td>
                        <input type="text" name="categoria" value="{{ i.categoria }}" class="form-control">
                    </td>

                    <td>
                        <input type="text" name="descripcion" value="{{ i.descripcion }}" class="form-control">
                    </td>

                    <td>
                        <button class="btn btn-primary btn-sm">Guardar</button>

                        <a href="{{ url_for('delete_income', id=i.id) }}"
                           class="btn btn-danger btn-sm"
                           onclick="return confirm('¿Seguro que querés eliminar este ingreso?')">
                            Eliminar
                        </a>
                    </td>

                </form>

            </tr>
            {% endfor %}
        </tbody>
    </table>

</div>

{% endblock %}
